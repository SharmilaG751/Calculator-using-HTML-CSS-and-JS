<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <div class="container">
        <div class="disp">
            <input type="text" readonly placeholder="Click Buttons">
        </div>
        <div class="btns">
            <button class="btn sh1">AC</button>
            <button class="btn sh1">%</button>
            <button class="btn sh1">C</button>
            <button class="btn sh1">/</button>
            <button class="btn sh2">7</button>
            <button class="btn sh2">8</button>
            <button class="btn sh2">9</button>
            <button class="btn sh1">X</button>
            <button class="btn sh2">4</button>
            <button class="btn sh2">5</button>
            <button class="btn sh2">6</button>
            <button class="btn sh1">-</button>
            <button class="btn sh2">1</button>
            <button class="btn sh2">2</button>
            <button class="btn sh2">3</button>
            <button class="btn sh1">+</button>
            <button class="btn sh2">00</button>
            <button class="btn sh2">0</button>
            <button class="btn sh2">.</button>
            <button class="btn sh3">=</button>
        </div>
    </div>
</body>
</html>
